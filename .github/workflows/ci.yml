on:
  pull_request:
  push:
    branches: [main]

name: Continuous integration

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: workspace-default
            command: cargo test --workspace
          - name: workspace-validator
            command: cargo test --workspace --features validator
          - name: workspace-all-features
            command: cargo test --workspace --all-features
          - name: ensemble-mysql-rustls
            command: cargo test -p ensemble --lib --no-default-features --features "json schema uuid validator mysql rustls" -- --test-threads=1
          - name: ensemble-postgres-rustls
            command: cargo test -p ensemble --lib --no-default-features --features "json schema uuid validator postgres rustls" -- --test-threads=1
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: 🗄️ Setup Rust cache
        uses: Swatinem/rust-cache@v2
      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: 🧪 Run tests
        run: ${{ matrix.command }}

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: 🗄️ Setup Rust cache
        uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - name: 🧹 Format code
        run: cargo fmt --all -- --check
      - name: 📎 Clippy
        uses: auguwu/clippy-action@1.2.2
        with:
          token: ${{secrets.GITHUB_TOKEN}}
